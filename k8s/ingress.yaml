apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: haven-ai-ingress
  annotations:
    ingress.kubernetes.io/ssl-redirect: "false"
spec:
  rules:
  - http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: haven-frontend-service
            port:
              number: 80
